<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="코스트코 파트너">
<title>🛒 코스트코 파트너</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #FFF9EC; color: #1A1A1A; }

.app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; background: #FFF9EC; }

/* HEADER */
.header { background: #F5A623; padding: 14px 18px 0; flex-shrink: 0; box-shadow: 0 2px 8px rgba(245,166,35,0.3); }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.app-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.date-badge { font-size: 11px; color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; font-weight: 600; }
.tabs { display: flex; gap: 2px; }
.tab { flex: 1; padding: 9px 4px 8px; text-align: center; font-size: 12px; font-weight: 600; border-radius: 10px 10px 0 0; cursor: pointer; border: none; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); transition: all 0.18s; }
.tab.active { background: #FFF9EC; color: #C8860A; }

/* CONTENT */
.content { flex: 1; overflow-y: auto; display: none; padding: 16px 16px 24px; -webkit-overflow-scrolling: touch; }
.content.active { display: block; }

/* BUTTONS */
.main-btn { width: 100%; padding: 15px; background: #F5A623; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; transition: transform 0.15s, opacity 0.15s; box-shadow: 0 3px 10px rgba(245,166,35,0.35); }
.main-btn:active { transform: scale(0.97); }
.main-btn.green { background: #2ECC71; box-shadow: 0 3px 10px rgba(46,204,113,0.3); }

/* PRODUCT CARDS */
.product-card { background: #fff; border: 1.5px solid #FFE0A0; border-radius: 16px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(245,166,35,0.1); }
.product-rank { font-size: 10px; color: #C8860A; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 5px; text-transform: uppercase; }
.product-name { font-size: 16px; font-weight: 800; color: #1A1A1A; margin-bottom: 12px; line-height: 1.3; }
.metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 11px; }
.metric { background: #FFF9EC; border-radius: 10px; padding: 8px 5px; text-align: center; border: 1px solid #FFE0A0; }
.metric-label { font-size: 9px; color: #AAA; font-weight: 700; letter-spacing: 0.3px; margin-bottom: 3px; text-transform: uppercase; }
.metric-val { font-size: 13px; font-weight: 800; color: #333; }
.metric-val.profit { color: #1A8A5A; }
.tags-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.tag { font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 700; }
.tag-green { background: #E6F9F0; color: #1A8A5A; }
.tag-amber { background: #FFF3D6; color: #C8860A; }
.tag-red { background: #FDECEA; color: #C0392B; }
.tip-box { font-size: 12px; color: #666; line-height: 1.55; padding: 8px 11px; border-radius: 0 9px 9px 0; margin-top: 7px; }
.tip-box.orange { background: #FFF9EC; border-left: 3px solid #F5A623; }
.tip-box.green { background: #E6F9F0; border-left: 3px solid #2ECC71; }

/* PERSONA */
.persona-scroll { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 12px; scrollbar-width: none; }
.persona-scroll::-webkit-scrollbar { display: none; }
.p-chip { flex-shrink: 0; padding: 7px 13px; border-radius: 20px; border: 1.5px solid #FFD580; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap; background: #fff; color: #C8860A; transition: all 0.18s; }
.p-chip.active { background: #F5A623; color: #fff; border-color: #F5A623; }
.persona-card { background: #fff; border-radius: 13px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1.5px solid #FFE0A0; }
.p-avatar { width: 42px; height: 42px; border-radius: 12px; background: #FFF3D6; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.p-name { font-size: 14px; font-weight: 800; color: #1A1A1A; }
.p-role { font-size: 11px; color: #AAA; margin-top: 2px; }
.quick-qs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.qq-btn { font-size: 11px; padding: 5px 11px; border-radius: 20px; background: #FFF3D6; border: 1px solid #FFD580; color: #C8860A; cursor: pointer; font-weight: 600; }
.chat-area { display: flex; flex-direction: column; gap: 9px; margin-bottom: 12px; min-height: 150px; }
.msg-wrap { display: flex; }
.msg-wrap.user { justify-content: flex-end; }
.msg-wrap.ai { justify-content: flex-start; flex-direction: column; max-width: 88%; }
.sender-name { font-size: 10px; color: #BBB; margin-bottom: 2px; padding-left: 2px; }
.bubble { padding: 10px 13px; border-radius: 14px; font-size: 13px; line-height: 1.6; max-width: 88%; }
.bubble.user { background: #F5A623; color: #fff; border-bottom-right-radius: 4px; }
.bubble.ai { background: #fff; color: #333; border: 1px solid #FFE0A0; border-bottom-left-radius: 4px; }
.empty-msg { text-align: center; padding: 30px 10px; color: #CCC; font-size: 13px; line-height: 1.8; }
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.chat-inp { flex: 1; background: #fff; border: 1.5px solid #FFD580; border-radius: 12px; padding: 10px 13px; color: #333; font-size: 13px; resize: none; outline: none; font-family: inherit; line-height: 1.4; max-height: 90px; }
.chat-inp:focus { border-color: #F5A623; }
.send-btn { width: 40px; height: 40px; border-radius: 12px; background: #F5A623; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 6px rgba(245,166,35,0.4); }

/* WEEKLY */
.w-card { background: #fff; border: 1.5px solid #FFE0A0; border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.w-title { font-size: 13px; font-weight: 800; color: #1A1A1A; margin-bottom: 7px; }
.w-body { font-size: 12px; color: #555; line-height: 1.7; }
.action-item { display: flex; gap: 8px; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid #FFF3D6; font-size: 12px; color: #555; }
.action-item:last-child { border-bottom: none; }
.action-day { background: #F5A623; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; margin-top: 1px; }

/* CALC */
.calc-card { background: #fff; border: 1.5px solid #FFE0A0; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.calc-title { font-size: 14px; font-weight: 800; color: #1A1A1A; margin-bottom: 13px; }
.c-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
.c-label { font-size: 12px; color: #888; }
.c-input { background: #FFF9EC; border: 1.5px solid #FFD580; border-radius: 9px; padding: 7px 11px; color: #333; font-size: 14px; font-weight: 700; text-align: right; width: 140px; outline: none; font-family: inherit; }
.c-input:focus { border-color: #F5A623; }
.result-box { background: linear-gradient(135deg, #FFF3D6, #FFE8A0); border-radius: 12px; padding: 13px; margin-top: 11px; border: 1.5px solid #FFD580; }
.result-label { font-size: 11px; color: #C8860A; margin-bottom: 5px; font-weight: 600; }
.result-val { font-size: 26px; font-weight: 800; color: #C8860A; }
.result-val.loss { color: #C0392B; }
.result-sub { font-size: 11px; color: #B8860A; margin-top: 4px; }

/* LOADING */
.loading-box { text-align: center; padding: 40px 20px; color: #C8A060; font-size: 13px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2.5px solid #FFD580; border-top-color: #F5A623; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SECTION LABEL */
.sec-label { font-size: 10px; color: #C8A060; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin: 4px 0 10px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">🛒 코스트코 파트너</div>
      <div class="date-badge" id="date-el">-</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="go('today',this)">오늘상품</button>
      <button class="tab" onclick="go('chat',this)">전문가</button>
      <button class="tab" onclick="go('weekly',this)">주간동향</button>
      <button class="tab" onclick="go('calc',this)">수익계산</button>
    </div>
  </div>

  <!-- TAB: 오늘 상품 -->
  <div class="content active" id="tab-today">
    <div class="sec-label">📅 오늘의 추천 상품</div>
    <button class="main-btn" id="rec-btn" onclick="showProducts()">✨ 오늘의 황금 상품 추천받기</button>
    <div id="rec-area"></div>
  </div>

  <!-- TAB: 전문가 상담 -->
  <div class="content" id="tab-chat">
    <div class="persona-scroll" id="p-scroll"></div>
    <div id="p-card"></div>
    <div class="quick-qs" id="qq-area"></div>
    <div class="chat-area" id="chat-area"></div>
    <div class="input-row">
      <textarea class="chat-inp" id="chat-inp" rows="1" placeholder="전문가에게 질문하세요..." oninput="resize(this)" onkeydown="ck(event)"></textarea>
      <button class="send-btn" onclick="send()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- TAB: 주간 동향 -->
  <div class="content" id="tab-weekly">
    <div class="sec-label">📊 이번 주 전략 리포트</div>
    <button class="main-btn green" id="wk-btn" onclick="showWeekly()">📊 이번 주 코스트코 트렌드 보기</button>
    <div id="wk-area"></div>
  </div>

  <!-- TAB: 수익 계산 -->
  <div class="content" id="tab-calc">
    <div class="sec-label">💰 수익 계산기</div>
    <div class="calc-card">
      <div class="calc-title">주간 순이익 계산</div>
      <div class="c-row"><span class="c-label">주간 매출 (원)</span><input class="c-input" id="rev" type="number" value="5000000" oninput="cp()"></div>
      <div class="c-row"><span class="c-label">총 매입가 (원)</span><input class="c-input" id="cost" type="number" value="3800000" oninput="cp()"></div>
      <div class="c-row"><span class="c-label">쿠팡 수수료 (%)</span><input class="c-input" id="comm" type="number" value="11" oninput="cp()"></div>
      <div class="c-row"><span class="c-label">주문 건수 (건)</span><input class="c-input" id="ords" type="number" value="150" oninput="cp()"></div>
      <div class="c-row"><span class="c-label">건당 배송비 (원)</span><input class="c-input" id="ship" type="number" value="3500" oninput="cp()"></div>
      <div id="profit-box" class="result-box"></div>
    </div>
    <div class="calc-card">
      <div class="calc-title">월 목표 달성 플랜</div>
      <div class="c-row"><span class="c-label">월 목표 순이익 (원)</span><input class="c-input" id="tgt" type="number" value="3000000" oninput="cg()"></div>
      <div class="c-row"><span class="c-label">건당 평균 마진 (원)</span><input class="c-input" id="mgn" type="number" value="3500" oninput="cg()"></div>
      <div id="goal-box" class="result-box"></div>
    </div>
  </div>

</div>

<script>
// ─── 날짜 ───
const DAYS = ['일','월','화','수','목','금','토'];
function setDate() {
  const d = new Date();
  document.getElementById('date-el').textContent =
    (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+DAYS[d.getDay()]+')';
}

// ─── 탭 전환 ───
function go(id, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='chat') initChat();
  if(id==='calc') { cp(); cg(); }
}

// ─── 상품 데이터 ───
const PRODUCTS_DB = [
  { name:'커클랜드 키친타월 12롤', costco:18000, coupang:27000, margin:4500, competition:'낮음',
    tags:['부피대형','경쟁기피','스테디셀러'], pkg:'비닐 랩핑 후 박스 포장 (눌림 방지)', reason:'부피가 커서 경쟁자가 기피 → 사실상 독점 가능. 반복구매 높음' },
  { name:'커클랜드 세탁세제 5.73L', costco:17000, coupang:25000, margin:4000, competition:'보통',
    tags:['생활필수품','차별화포장','리뷰역용'], pkg:'캡 부분 지퍼백 밀봉 후 뽁뽁이 2중 + 박스', reason:'1~2점 리뷰 "새요, 터졌어요" → 포장 강조시 바로 차별화' },
  { name:'커클랜드 견과류 믹스 1.13kg', costco:19000, coupang:27000, margin:3500, competition:'낮음',
    tags:['장기보관','선물용','상온식품'], pkg:'실링 확인 후 완충재 + 박스 포장', reason:'유통기한 길고 선물용 수요 꾸준. 세트 구성 가능' },
  { name:'커클랜드 올리브오일 3L', costco:22000, coupang:32000, margin:5000, competition:'낮음',
    tags:['고객단가','반복구매','부피대형'], pkg:'뽁뽁이 2중 필수 (유리병은 신문지 추가)', reason:'객단가 높고 요리 유튜브 트렌드로 수요 증가' },
  { name:'커클랜드 비타민C 1000mg 500정', costco:16000, coupang:23000, margin:3500, competition:'낮음',
    tags:['사계절수요','경량','건강식품'], pkg:'박스 포장만으로 충분 (충격 낮음)', reason:'계절 안 타는 필수 영양제. 재구매율 최상위' },
  { name:'커클랜드 오메가3 400캡슐', costco:20000, coupang:28000, margin:4000, competition:'낮음',
    tags:['건강기능식품','경량','스테디셀러'], pkg:'완충재 소량 + 박스 포장', reason:'중장년층 필수 제품. 경쟁자 적고 마진 안정적' },
  { name:'커클랜드 아몬드 1.36kg', costco:17500, coupang:24000, margin:3200, competition:'보통',
    tags:['건강간식','장기보관','묶음가능'], pkg:'밀봉 확인 후 완충재 + 박스', reason:'다이어트 트렌드로 꾸준한 수요. 견과류 세트 구성 가능' },
  { name:'커클랜드 화장지 30롤', costco:16000, coupang:24000, margin:3800, competition:'낮음',
    tags:['생활필수품','부피대형','독점가능'], pkg:'큰 박스에 눌리지 않게 포장', reason:'생활필수품 중 부피 최대 → 경쟁자 기피. 단골 고객 확보 쉬움' },
];

let productIdx = 0;
function showProducts() {
  const btn = document.getElementById('rec-btn');
  btn.textContent = '🔄 새로운 추천 받기';
  // 4개씩 순환
  const start = productIdx % PRODUCTS_DB.length;
  const picks = [];
  for(let i=0;i<4;i++) picks.push(PRODUCTS_DB[(start+i)%PRODUCTS_DB.length]);
  productIdx = (productIdx + 4) % PRODUCTS_DB.length;
  renderProducts(picks);
}

function renderProducts(arr) {
  const cc = c => c==='낮음'?'tag-green':c==='보통'?'tag-amber':'tag-red';
  document.getElementById('rec-area').innerHTML = arr.map((p,i)=>`
    <div class="product-card">
      <div class="product-rank">🏆 ${['1위','2위','3위','4위'][i]} 추천</div>
      <div class="product-name">${p.name}</div>
      <div class="metrics-grid">
        <div class="metric"><div class="metric-label">매입가</div><div class="metric-val">${p.costco.toLocaleString()}원</div></div>
        <div class="metric"><div class="metric-label">판매가</div><div class="metric-val">${p.coupang.toLocaleString()}원</div></div>
        <div class="metric"><div class="metric-label">순마진</div><div class="metric-val profit">+${p.margin.toLocaleString()}원</div></div>
      </div>
      <div class="tags-row">
        <span class="tag ${cc(p.competition)}">경쟁 ${p.competition}</span>
        ${p.tags.map(t=>`<span class="tag tag-amber">${t}</span>`).join('')}
      </div>
      <div class="tip-box orange">📦 ${p.pkg}</div>
      <div class="tip-box green">💡 ${p.reason}</div>
    </div>`).join('');
}

// ─── 전문가 데이터 ───
const PERSONAS = [
  { id:'ceo', name:'소셜커머스 대표', role:'10년차 쿠팡 전략가', icon:'👔',
    qs:['아이템위너 따는 법','최적 판매가 설정','쿠팡 계정 점수 관리'],
    answers: {
      '아이템위너 따는 법': '아이템위너는 3가지가 핵심입니다.\n\n① 가격: 배송비 포함 최저가에서 100~200원 낮게 설정\n② 판매량: 초반 5~10건 빠르게 팔아야 알고리즘이 인식\n③ 취소율·반품율: 3% 미만 유지 필수\n\n특히 처음엔 마진을 줄이더라도 아이템위너 먼저 따세요. 위너가 되면 트래픽이 자동으로 몰립니다.',

let curP = PERSONAS[0];
let chatH = {};
PERSONAS.forEach(p=>{ chatH[p.id]=[]; });

function initChat() {
  renderChips(); renderPCard(); renderQQ(); renderChat();
}

function renderChips() {
  document.getElementById('p-scroll').innerHTML = PERSONAS.map(p=>
    `<button class="p-chip${p.id===curP.id?' active':''}" onclick="selP('${p.id}')">${p.icon} ${p.name}</button>`
  ).join('');
}

function renderPCard() {
  document.getElementById('p-card').innerHTML = `
    <div class="persona-card">
      <div class="p-avatar">${curP.icon}</div>
      <div><div class="p-name">${curP.name}</div><div class="p-role">${curP.role}</div></div>
    </div>`;
}

function renderQQ() {
  document.getElementById('qq-area').innerHTML = curP.qs.map(q=>
    `<button class="qq-btn" onclick="askQ('${q}')">${q}</button>`).join('');
}

function renderChat() {
  const msgs = chatH[curP.id];
  const el = document.getElementById('chat-area');
  if(!msgs.length) {
    el.innerHTML = `<div class="empty-msg">${curP.icon}<br><br><strong>${curP.name}</strong>에게 무엇이든 물어보세요<br><span style="font-size:11px;color:#DDD">위 버튼으로 빠르게 질문할 수 있어요</span></div>`;
    return;
  }
  el.innerHTML = msgs.map(m=>`
    <div class="msg-wrap ${m.r}">
      ${m.r==='ai'?`<div class="sender-name">${curP.name}</div>`:''}
      <div class="bubble ${m.r}">${m.c.replace(/\n/g,'<br>')}</div>
    </div>`).join('');
  setTimeout(()=>el.scrollTop=el.scrollHeight, 50);
}

function selP(id) { curP=PERSONAS.find(p=>p.id===id); initChat(); }

function askQ(q) { document.getElementById('chat-inp').value=q; send(); }

function resize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }

function ck(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }

function send() {
  const inp = document.getElementById('chat-inp');
  const txt = inp.value.trim();
  if(!txt) return;
  inp.value=''; inp.style.height='auto';
  chatH[curP.id].push({r:'user',c:txt});
  // AI 응답 생성
  const reply = getReply(curP, txt);
  chatH[curP.id].push({r:'ai',c:reply});
  renderChat();
}

function getReply(persona, txt) {
  // 정확한 키 매칭
  if(persona.answers[txt]) return persona.answers[txt];
  // 부분 키워드 매칭
  const keys = Object.keys(persona.answers).filter(k=>k!=='default');
  for(const key of keys) {
    if(txt.includes(key) || key.split('').some(ch=>txt.includes(ch) && ch.length>1)) {
      // 키워드 일부 포함 체크
    }
  }
  // 공통 키워드로 매칭
  const keywordMap = [
    {words:['아이템위너','위너','winner'],key:'아이템위너 따는 법'},
    {words:['판매가','가격','price','얼마'],key:'최적 판매가 설정'},
    {words:['계정','점수','score'],key:'쿠팡 계정 점수 관리'},
    {words:['체크','매장','방문','확인'],key:'코스트코 매장 체크리스트'},
    {words:['포장','박스','뽁뽁이','packing'],key:'포장 실수 방지법'},
    {words:['품절','재고','없','sold out'],key:'품절 대응 방법'},
    {words:['썸네일','이미지','클릭','사진'],key:'클릭률 높이는 썸네일'},
    {words:['별점','리뷰','1점','2점','평점'],key:'별점 1~2점 역이용'},
    {words:['상세페이지','문구','상단','설명'],key:'상세페이지 상단 문구'},
    {words:['부가세','세금','vat','세무'],key:'부가세 신고 기준'},
    {words:['현대카드','카드','비용'],key:'현대카드 비용처리'},
    {words:['영수증','코스트코 영수증','증빙'],key:'코스트코 영수증 처리'},
    {words:['자동','분석','추천'],key:'상품 자동 분석법'},
    {words:['상세페이지 ai','ai 생성','자동생성'],key:'상세페이지 AI 생성'},
    {words:['모니터링','경쟁자','가격추적'],key:'경쟁자 가격 모니터링'},
  ];
  for(const km of keywordMap) {
    if(km.words.some(w=>txt.includes(w))) {
      if(persona.answers[km.key]) return persona.answers[km.key];
    }
  }
  return persona.answers['default'];
}

  { hot:'🏠 생활용품 (키친타월, 화장지, 세탁세제). 봄맞이 대청소 시즌 수요 증가.', avoid:'유통기한 6개월 미만 가공식품. 봄철 재고 회전 느린 시기.', pkg:'키친타월·화장지 눌림 방지용 큰 박스 사용 필수. 부피 큰 제품은 박스 여유 공간에 충전재.',  pricing:'부피 큰 생활용품은 배송비를 5,000~6,000원으로 올려도 구매자 수용. 상품가 낮게 + 배송비 높게 전략.',

  { hot:'🥜 견과류·상온 간식 (아몬드, 믹스넛, 크래커). 봄 소풍·캠핑 시즌 선물세트 수요.', avoid:'대용량 즉석식품. 1인 가구 증가로 소용량 선호. 대용량은 판매 속도 느림.', pkg:'견과류 포장 실링 꼼꼼히 확인 후 발송. 기름 성분으로 박스 오염 주의, 비닐 속포장 추천.',  pricing:'견과류 묶음세트 구성 시 단품보다 15~20% 높은 가격 설정 가능. 아이템위너 경쟁 차단 효과.',
    actions:['견과류 카테고리 묶음세트 상품 신규 등록 검토', '코스트코 신규 입고 시즌 상품 확인 (캠핑·야외용품)', '리뷰 관리: 이번 주 들어온 부정 리뷰 답글 작성']},
];
let weeklyIdx = 0;

function showWeekly() {
  const btn = document.getElementById('wk-btn');
  btn.textContent = '🔄 다음 주 분석 보기';
  const d = WEEKLY_DATA[weeklyIdx % WEEKLY_DATA.length];
  weeklyIdx++;
  document.getElementById('wk-area').innerHTML = `
    <div class="w-card"><div class="w-title">🔥 이번 주 핫 카테고리</div><div class="w-body">${d.hot}</div></div>
    <div class="w-card"><div class="w-title">⚠️ 이번 주 피할 것</div><div class="w-body">${d.avoid}</div></div>
    <div class="w-card"><div class="w-title">📦 포장 주의사항</div><div class="w-body">${d.pkg}</div></div>
    <div class="w-card"><div class="w-title">💰 가격 전략</div><div class="w-body">${d.pricing}</div></div>
    <div class="w-card"><div class="w-title">✅ 이번 주 액션 플랜</div><div class="w-body">${d.actions.map((a,i)=>`<div class="action-item"><span class="action-day">${['월','수','금'][i]}</span><span>${a}</span></div>`).join('')}</div></div>`;
}

// ─── 수익 계산 ───
function cp() {
  const rev=+document.getElementById('rev').value||0;
  const cost=+document.getElementById('cost').value||0;
  const comm=+document.getElementById('comm').value||0;
  const ords=+document.getElementById('ords').value||0;
  const ship=+document.getElementById('ship').value||0;
  const cf=Math.round(rev*comm/100);
  const ts=ords*ship;
  const profit=rev-cost-cf-ts;
  const mar=rev>0?(profit/rev*100).toFixed(1):0;
  document.getElementById('profit-box').innerHTML=`
    <div class="result-label">수수료 ${cf.toLocaleString()}원 + 배송비 ${ts.toLocaleString()}원 차감</div>
    <div class="result-val${profit<0?' loss':''}">${profit>=0?'+':''}${profit.toLocaleString()}원</div>
    <div class="result-sub">마진율 ${mar}% · 건당 평균 ${ords>0?Math.round(profit/ords).toLocaleString():0}원</div>`;
}

function cg() {
  const tgt=+document.getElementById('tgt').value||0;
  const mgn=+document.getElementById('mgn').value||1;
  const mo=Math.ceil(tgt/mgn);
  const dy=Math.ceil(mo/26);
  document.getElementById('goal-box').innerHTML=`
    <div class="result-label">주 6일 기준 · 월 ${mo.toLocaleString()}건 필요</div>
    <div class="result-val">하루 ${dy}건</div>
    <div class="result-sub">주간 목표 ${Math.ceil(mo/4).toLocaleString()}건 · 월 매출 약 ${Math.round(tgt/0.15/10000)*10000 .toLocaleString()}원</div>`;
}

// ─── 초기화 ───
setDate();
cp(); cg();
</script>
